          NOTE: Ignoring 404s and 499s in this metric, since a 404 is a normal response for errant requests'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md
      expr: (sum(rate(nginx_ingress_controller_requests{status=~"4.*", controller_class=~"k8s.io/ingress-internal"}[5m]))-sum(rate(nginx_ingress_controller_requests{status=~"404|499", controller_class=~"k8s.io/ingress-internal"}[5m])))/(sum(rate(nginx_ingress_controller_requests{controller_class=~"k8s.io/ingress-internal"}[5m]))-
