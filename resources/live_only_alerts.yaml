    # -------------------------------------------------------------------------
    # internal ingress alerts
    # -------------------------------------------------------------------------
    - alert: Internal-ingress-NginxIngress-Latency(ms)-High
      expr: sum by(pod)(rate(nginx_ingress_controller_ingress_upstream_latency_seconds_sum{ingress=~".*",pod=~"nginx-ingress-internal-controller-.*"}[5m])) / sum by(pod)(rate(nginx_ingress_controller_ingress_upstream_latency_seconds_count{ingress=~".*",pod=~"nginx-ingress-internal-controller-.*"}[5m])) * 1000 > 300
