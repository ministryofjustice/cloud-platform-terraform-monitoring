          2 or more nginx-ingress-beta pods have been unavailable for 5 minutes'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginxingresspoddown
      expr: sum by(namespace) (kube_pod_status_phase{namespace="ingress-controllers",phase="Failed",pod=~"nginx-ingress-beta-controller-.*"})> 1
      for: 5m
      labels:
        severity: warning

    - alert: Beta-ingress-NginxIngressPodPending
      annotations:
        message: '{{ $labels.pod}} pod unavailable in the {{ $labels.namespace}} namespace.
          1 or more nginx-ingress-beta pods have been unavailable for 5 minutes'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginxingresspoddown
      expr: sum by(pod) (kube_pod_status_phase{namespace="ingress-controllers",phase=~"Pending|Unknown",pod=~"nginx-ingress-beta-controller-.*"})> 0
      for: 5m
      labels:
        severity: warning

    - alert: Beta-ingress-NginxIngressSuccessRate
      annotations:
        message: 'Percentage of successful requests of nginx-beta over the last 15 minutes is less than 50%.
          NOTE: Ignoring 404s and 499s in this metric, since a 404 is a normal response for errant requests'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginx-success-rate
      expr: sum(rate(nginx_ingress_controller_requests{status=~"[1-3].*", controller_class=~"k8s.io/ingress-beta"}[5m]))/(sum(rate(nginx_ingress_controller_requests{controller_class=~"k8s.io/ingress-beta"}[5m]))-
        sum(rate(nginx_ingress_controller_requests{status=~"404|499", controller_class=~"k8s.io/ingress-beta"}[5m]))) * 100 < 50
      for: 15m
      labels:
        severity: warning

    - alert: Beta-ingress-NginxIngress4xxRate
