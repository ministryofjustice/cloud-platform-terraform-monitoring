apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    prometheus: ingress-controller
  name: ingress-controller-apps-live-only.rules
spec:
  groups:
  - name: nginx-ingress-controller-apps-live-only
    rules:
    # -------------------------------------------------------------------------
    # default-non-prod ingress alerts
    # -------------------------------------------------------------------------
    - alert: Default-non-prod-ingress-NginxIngress-Latency(ms)-High
      expr: sum by(pod)(rate(nginx_ingress_controller_ingress_upstream_latency_seconds_sum{ingress=~".*",pod=~"nginx-ingress-default-non-prod-controller-.*"}[5m])) / sum by(pod)(rate(nginx_ingress_controller_ingress_upstream_latency_seconds_count{ingress=~".*",pod=~"nginx-ingress-default-non-prod-controller-.*"}[5m])) * 1000 > 300
      for: 5m
      labels:
        severity: warning
      annotations:
        message: '{{ $labels.pod}} - nginx-ingress-default-non-prod ingress - latency delays are on the high side, with a value of {{ $value }} {{ $labels.namespace}} namespace. Please investigate'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#NginxIngress-Latency(ms)---warning

    - alert: Default-non-prod-ingress-NginxConfigReloadFailure-Warning
      annotations:
        message: The Nginx Config has failed to reload for pod {{ $labels.pod }}
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginx-config-reload-failure
      expr: nginx_ingress_controller_config_last_reload_successful{controller_class="k8s.io/ingress-default-non-prod"} == 0
      for: 3m
      labels:
        severity: warning
  
    - alert: Default-non-prod-ingress-NginxConfigReloadFailure
      annotations:
        message: The Nginx Config has failed to reload for pod {{ $labels.pod }}
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginx-config-reload-failure
      expr: nginx_ingress_controller_config_last_reload_successful{controller_class="k8s.io/ingress-default-non-prod"} == 0
      for: 5m
      labels:
        severity: warning

    - alert: Default-non-prod-ingress-NginxIngressPodDown
      annotations:
        message: '{{ $labels.pod}} pod unavailable in the {{ $labels.namespace}} namespace.
          1 or more nginx-ingress-default-non-prod pods have been unavailable for 5 minutes'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginxingresspoddown
      expr: sum by(pod) (kube_pod_status_phase{namespace="ingress-controllers",phase="Failed",pod=~"nginx-ingress-default-non-prod-controller-.*"})> 0
      for: 5m
      labels:
        severity: warning

    - alert: Default-non-prod-ingress-NginxIngressDown
      annotations:
        message: '{{ $labels.pod}} pod unavailable in the {{ $labels.namespace}} namespace.
          5 or more nginx-ingress-default-non-prod pods have been unavailable for 5 minutes'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginxingresspoddown
      expr: sum by(namespace) (kube_pod_status_phase{namespace="ingress-controllers",phase="Failed",pod=~"nginx-ingress-default-non-prod-controller-.*"})> 4
      for: 5m
      labels:
        severity: warning

    - alert: Default-non-prod-ingress-NginxIngressPodPending
      annotations:
        message: '{{ $labels.pod}} pod unavailable in the {{ $labels.namespace}} namespace.
          1 or more nginx-ingress-default-non-prod pods have been unavailable for 5 minutes'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginxingresspoddown
      expr: sum by(pod) (kube_pod_status_phase{namespace="ingress-controllers",phase=~"Pending|Unknown",pod=~"nginx-ingress-default-non-prod-controller-.*"})> 0
      for: 5m
      labels:
        severity: warning

    - alert: Default-non-prod-ingress-NginxIngressSuccessRate
      annotations:
        message: 'Percentage of successful requests of nginx-default-non-prod over the last 15 minutes is less than 50%.
          NOTE: Ignoring 404s and 499s in this metric, since a 404 is a normal response for errant requests'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginx-success-rate
      expr: sum(rate(nginx_ingress_controller_requests{status=~"[1-3].*", controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))/(sum(rate(nginx_ingress_controller_requests{controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))-
        sum(rate(nginx_ingress_controller_requests{status=~"404|499", controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))) * 100 < 50
      for: 15m
      labels:
        severity: warning

    - alert: Default-non-prod-ingress-NginxIngress4xxRate
      annotations:
        message: 'Percentage of 4xx requests of nginx-default-non-prod over the last 30 minutes is more than 40%.
          NOTE: Ignoring 404s and 499s in this metric, since a 404 is a normal response for errant requests'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md
      expr: (sum(rate(nginx_ingress_controller_requests{status=~"4.*", controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))-sum(rate(nginx_ingress_controller_requests{status=~"404|499", controller_class=~"k8s.io/ingress-default-non-prod"}[5m])))/(sum(rate(nginx_ingress_controller_requests{controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))-
        sum(rate(nginx_ingress_controller_requests{status=~"404|499", controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))) * 100 > 40
      for: 30m
      labels:
        severity: warning

    - alert: Default-non-prod-ingress-NginxIngress5xxRate
      annotations:
        message: 'Percentage of 5xx requests of nginx-default-non-prod over the last 15 minutes is more than 30%.
          NOTE: Ignoring 404s and 499s in this metric, since a 404 is a normal response for errant requests'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md
      expr: sum(rate(nginx_ingress_controller_requests{status=~"5.*", controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))/(sum(rate(nginx_ingress_controller_requests{controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))-
        sum(rate(nginx_ingress_controller_requests{status=~"404|499", controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))) * 100 > 30
      for: 15m
      labels:
        severity: warning

    - alert: Default-non-prod-ingress-NginxIngress499Rate
      annotations:
        message: 'Percentage of 499 requests of nginx-default-non-prod over the last 15 minutes is more than 2%.
          NOTE: Ignoring 404s in this metric, since a 404 is a normal response for errant requests'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md
      expr: sum(rate(nginx_ingress_controller_requests{status="499", controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))/(sum(rate(nginx_ingress_controller_requests{controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))-
        sum(rate(nginx_ingress_controller_requests{status="404", controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))) * 100 > 2
      for: 15m
      labels:
        severity: warning

    - alert: Default-non-prod-ingress-NginxIngress404Rate
      annotations:
        message: 'Percentage of 404 requests of nginx-default-non-prod over the last 30 minutes is more than 30%.
          NOTE: Ignoring 499s in this metric, since a 499 is a normal response when client closes the connection early eg. closed tab'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginx-success-rate
      expr: sum(rate(nginx_ingress_controller_requests{status="404", controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))/(sum(rate(nginx_ingress_controller_requests{controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))-
        sum(rate(nginx_ingress_controller_requests{status="499", controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))) * 100 > 30
      for: 30m
      labels:
        severity: warning

    - alert: Default-non-prod-ingress-NginxIngress200Rate
      annotations:
        message: 'Percentage of 200 requests of nginx-default-non-prod over the last 15 minutes is less than 30%.
          NOTE: Ignoring 404s and 499s in this metric, since a 499 is a normal response when client closes the connection early eg. closed tab'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginx-success-rate
      expr: sum(rate(nginx_ingress_controller_requests{status="200", controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))/(sum(rate(nginx_ingress_controller_requests{controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))-
        sum(rate(nginx_ingress_controller_requests{status=~"404|499", controller_class=~"k8s.io/ingress-default-non-prod"}[5m]))) * 100 < 30
      for: 15m
      labels:
        severity: warning


    # -------------------------------------------------------------------------
    # modsec-non-prod ingress alerts
    # -------------------------------------------------------------------------
    - alert: Modsec-non-prod-ingress-NginxIngress-Latency(ms)-High
      expr: sum by(pod)(rate(nginx_ingress_controller_ingress_upstream_latency_seconds_sum{ingress=~".*",pod=~"nginx-ingress-modsec-non-prod-controller-.*"}[5m])) / sum by(pod)(rate(nginx_ingress_controller_ingress_upstream_latency_seconds_count{ingress=~".*",pod=~"nginx-ingress-modsec-non-prod-controller-.*"}[5m])) * 1000 > 300
      for: 5m
      labels:
        severity: warning
      annotations:
        message: '{{ $labels.pod}} - nginx-ingress-modsec-non-prod ingress - latency delays are on the high side, with a value of {{ $value }} {{ $labels.namespace}} namespace. Please investigate'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#NginxIngress-Latency(ms)---warning

    - alert: Modsec-non-prod-ingress-NginxConfigReloadFailure-Warning
      annotations:
        message: The Nginx Config has failed to reload for pod {{ $labels.pod }}
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginx-config-reload-failure
      expr: nginx_ingress_controller_config_last_reload_successful{controller_class="k8s.io/ingress-modsec-non-prod"} == 0
      for: 3m
      labels:
        severity: warning
    - alert: Modsec-non-prod-ingress-NginxConfigReloadFailure
      annotations:
        message: The Nginx Config has failed to reload for pod {{ $labels.pod }}
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginx-config-reload-failure
      expr: nginx_ingress_controller_config_last_reload_successful{controller_class="k8s.io/ingress-modsec-non-prod"} == 0
      for: 5m
      labels:
        severity: warning

    - alert: Modsec-non-prod-ingress-NginxIngressPodDown
      annotations:
        message: '{{ $labels.pod}} pod unavailable in the {{ $labels.namespace}} namespace.
          1 or more nginx-ingress-modsec-non-prod pods have been unavailable for 5 minutes'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginxingresspoddown
      expr: sum by(pod) (kube_pod_status_phase{namespace="ingress-controllers",phase="Failed",pod=~"nginx-ingress-modsec-non-prod-controller-.*"})> 0
      for: 5m
      labels:
        severity: warning

    - alert: Modsec-non-prod-ingress-NginxIngressDown
      annotations:
        message: '{{ $labels.pod}} pod unavailable in the {{ $labels.namespace}} namespace.
          3 or more nginx-ingress-modsec-non-prod pods have been unavailable for 5 minutes'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginxingresspoddown
      expr: sum by(namespace) (kube_pod_status_phase{namespace="ingress-controllers",phase="Failed",pod=~"nginx-ingress-modsec-non-prod-controller-.*"})> 2
      for: 5m
      labels:
        severity: warning

    - alert: Modsec-non-prod-ingress-NginxIngressPodPending
      annotations:
        message: '{{ $labels.pod}} pod unavailable in the {{ $labels.namespace}} namespace.
          1 or more nginx-ingress-modsec-non-prod pods have been unavailable for 5 minutes'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginxingresspoddown
      expr: sum by(pod) (kube_pod_status_phase{namespace="ingress-controllers",phase=~"Pending|Unknown",pod=~"nginx-ingress-modsec-non-prod-controller-.*"})> 0
      for: 5m
      labels:
        severity: warning

    - alert: Modsec-non-prod-ingress-NginxIngressSuccessRate
      annotations:
        message: 'Percentage of successful requests of nginx-modsec-non-prod over the last 15 minutes is less than 50%.
          NOTE: Ignoring 404s and 499s in this metric, since a 404 is a normal response for errant requests'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md#nginx-success-rate
      expr: sum(rate(nginx_ingress_controller_requests{status=~"[1-3].*", controller_class=~"k8s.io/ingress-modsec-non-prod"}[5m]))/(sum(rate(nginx_ingress_controller_requests{controller_class=~"k8s.io/ingress-modsec-non-prod"}[5m]))-
        sum(rate(nginx_ingress_controller_requests{status=~"404|499", controller_class=~"k8s.io/ingress-modsec-non-prod"}[5m]))) * 100 < 50
      for: 15m
      labels:
        severity: warning

    - alert: Modsec-non-prod-ingress-NginxIngress4xxRate
      annotations:
        message: 'Percentage of 4xx requests of nginx-modsec-non-prod over the last 30 minutes is more than 40%.
          NOTE: Ignoring 404s and 499s in this metric, since a 404 is a normal response for errant requests'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md
      expr: (sum(rate(nginx_ingress_controller_requests{status=~"4.*", controller_class=~"k8s.io/ingress-modsec-non-prod"}[5m]))-sum(rate(nginx_ingress_controller_requests{status=~"404|499", controller_class=~"k8s.io/ingress-modsec-non-prod"}[5m])))/(sum(rate(nginx_ingress_controller_requests{controller_class=~"k8s.io/ingress-modsec-non-prod"}[5m]))-
        sum(rate(nginx_ingress_controller_requests{status=~"404|499", controller_class=~"k8s.io/ingress-modsec-non-prod"}[5m]))) * 100 > 40
      for: 30m
      labels:
        severity: warning

    - alert: Modsec-non-prod-ingress-NginxIngress5xxRate
      annotations:
        message: 'Percentage of 5xx requests of nginx-modsec-non-prod over the last 15 minutes is more than 30%.
          NOTE: Ignoring 404s and 499s in this metric, since a 404 is a normal response for errant requests'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md
      expr: sum(rate(nginx_ingress_controller_requests{status=~"5.*", controller_class=~"k8s.io/ingress-modsec-non-prod"}[5m]))/(sum(rate(nginx_ingress_controller_requests{controller_class=~"k8s.io/ingress-modsec-non-prod"}[5m]))-
        sum(rate(nginx_ingress_controller_requests{status=~"404|499", controller_class=~"k8s.io/ingress-modsec-non-prod"}[5m]))) * 100 > 30
      for: 15m
      labels:
        severity: warning

    - alert: Modsec-non-prod-ingress-NginxIngress499Rate
      annotations:
        message: 'Percentage of 499 requests of nginx-modsec-non-prod over the last 15 minutes is more than 2%.
          NOTE: Ignoring 404s in this metric, since a 404 is a normal response for errant requests'
        runbook_url: https://github.com/ministryofjustice/cloud-platform-terraform-monitoring/blob/main/resources/prometheusrule-alerts/README.md
      expr: sum(rate(nginx_ingress_controller_requests{status="499", controller_class=~"k8s.io/ingress-modsec-non-prod"}[5m]))/(sum(rate(nginx_ingress_controller_requests{controller_class=~"k8s.io/ingress-modsec-non-prod"}[5m]))-
        sum(rate(nginx_ingress_controller_requests{status="404", controller_class=~"k8s.io/ingress-modsec-non-prod"}[5m]))) * 100 > 2
      for: 15m
      labels:
        severity: warning

    - alert: Modsec-non-prod-ingress-NginxIngress404Rate
